<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea002a"/>
      <stop offset="100%" stop-color="#ff4466"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <!-- Logo text -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
        font-size="96" font-weight="900" fill="#ea002a" letter-spacing="8">MULTIPASS</text>
  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="28" fill="#888" letter-spacing="6" text-transform="uppercase">SOUTH PORTLAND METRO APA</text>
  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="24" fill="#ccc">Singles Qualifier Registration</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
