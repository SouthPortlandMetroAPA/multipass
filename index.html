<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiPass — South Portland Metro APA</title>

  <!-- Open Graph tags for Facebook link previews -->
  <meta property="og:title" content="MultiPass — Singles Qualifier Registration">
  <meta property="og:description" content="Register for South Portland Metro APA singles qualifiers. Check eligibility, sign up for events, and manage your registrations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://southportlandmetroapa.github.io/MultiPass/">
  <meta property="og:image" content="https://southportlandmetroapa.github.io/MultiPass/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="South Portland Metro APA">

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MultiPass — Singles Qualifier Registration">
  <meta name="twitter:description" content="Register for SPM-APA singles qualifiers. Check eligibility and sign up in seconds.">
  <meta name="twitter:image" content="https://southportlandmetroapa.github.io/MultiPass/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }
    /* Loading state — shows while iframe loads */
    .loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff; z-index: 10;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      font-size: 48px; font-weight: 900;
      letter-spacing: 4px; margin-bottom: 8px;
      background: linear-gradient(135deg, #ea002a, #ff4466);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .loading-sub {
      font-size: 14px; color: #888; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 24px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333; border-top-color: #ea002a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading splash while GAS app initializes -->
  <div class="loading" id="loading">
    <div class="loading-logo">MULTIPASS</div>
    <div class="loading-sub">South Portland Metro APA</div>
    <div class="spinner"></div>
  </div>

  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbwpC0POf2V-pSKzcdhdC7AdiYGaGVibNfEwHuka07b8Z9QOypMYkqOLrtayiWIR3uJvnQ/exec"
    allow="clipboard-write"
    loading="eager"
    onload="document.getElementById('loading').classList.add('hidden');"
  ></iframe>
</body>
</html>
