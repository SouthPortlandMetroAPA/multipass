<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiPass — South Portland Metro APA</title>

  <!-- Open Graph tags for Facebook link previews -->
  <meta property="og:title" content="MultiPass — Singles Qualifier Registration">
  <meta property="og:description" content="Register for South Portland Metro APA singles qualifiers. Check eligibility, sign up for events, and manage your registrations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://southportlandmetroapa.github.io/MultiPass/">
  <meta property="og:image" content="https://southportlandmetroapa.github.io/MultiPass/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="South Portland Metro APA">

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MultiPass — Singles Qualifier Registration">
  <meta name="twitter:description" content="Register for SPM-APA singles qualifiers. Check eligibility and sign up in seconds.">
  <meta name="twitter:image" content="https://southportlandmetroapa.github.io/MultiPass/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    .page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    /* Accent bar top */
    .accent-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #ea002a, #ff4466, #ea002a);
      z-index: 10;
    }

    .logo {
      font-size: clamp(48px, 12vw, 80px);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #ea002a 0%, #ff4466 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .subtitle {
      font-size: clamp(12px, 3vw, 18px);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 40px;
    }

    .tagline {
      font-size: clamp(16px, 4vw, 22px);
      color: #aaa;
      margin-bottom: 48px;
      max-width: 500px;
      line-height: 1.5;
    }

    .launch-btn {
      display: inline-block;
      padding: 18px 48px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #ea002a, #ff4466);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(234, 0, 42, 0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .launch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(234, 0, 42, 0.5);
    }
    .launch-btn:active {
      transform: translateY(0);
    }

    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }
    .footer a { color: #666; text-decoration: none; }
    .footer a:hover { color: #ea002a; }

    /* Pulse animation on the button */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(234, 0, 42, 0.35); }
      50% { box-shadow: 0 8px 48px rgba(234, 0, 42, 0.55); }
    }
    .launch-btn { animation: pulse 2.5s ease-in-out infinite; }
    .launch-btn:hover { animation: none; }
  </style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="page">
    <div class="logo">MULTIPASS</div>
    <div class="subtitle">South Portland Metro APA</div>
    <div class="tagline">Check your eligibility and register for singles qualifiers</div>
    <a class="launch-btn"
       href="https://script.google.com/macros/s/AKfycbwpC0POf2V-pSKzcdhdC7AdiYGaGVibNfEwHuka07b8Z9QOypMYkqOLrtayiWIR3uJvnQ/exec"
       target="_blank"
       rel="noopener">
      Launch MultiPass
    </a>
  </div>

  <div class="footer">
    <a href="https://linktr.ee/spmapa">linktr.ee/spmapa</a>
  </div>
</body>
</html>
