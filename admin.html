    // ======================================================================
    // Qualifier Add/Edit Modal
    // ======================================================================

    /** If editing, stores { dateDisplay, format } of the original. Null = adding. */
    var _qualEditingOriginal = null;

    /** Currently selected format in the modal ('8' or '9'). */
    var _qualSelectedFormat = '';

    /**
     * Shows the qualifier add/edit modal.
     * If qualifier is null, shows an empty "Add" form.
     * If qualifier is an object, pre-populates all fields for editing.
     */
    function showQualifierModal(qualifier) {
      var title = qualifier ? 'Edit Qualifier' : 'Add Qualifier';
      document.getElementById('qualModalTitle').textContent = title;

      if (qualifier) {
        _qualEditingOriginal = {
          dateDisplay: qualifier.dateDisplay,
          format: qualifier.format
        };
        document.getElementById('qualStartInput').value = qualifier.startISO || '';
        document.getElementById('qualEndInput').value = qualifier.endISO || '';
        document.getElementById('qualCutoffInput').value = qualifier.cutoffISO || '';
        document.getElementById('qualLocationName').value = qualifier.locationName || '';
        document.getElementById('qualLocationAddress').value = qualifier.locationAddress || '';
        selectQualFormat(qualifier.format);
      } else {
        _qualEditingOriginal = null;
        document.getElementById('qualStartInput').value = '';
        document.getElementById('qualEndInput').value = '';
        document.getElementById('qualCutoffInput').value = '';
        document.getElementById('qualLocationName').value = '';
        document.getElementById('qualLocationAddress').value = '';
        selectQualFormat('');
      }

      document.getElementById('qualifierModal').style.display = 'flex';
    }

    function closeQualifierModal() {
      document.getElementById('qualifierModal').style.display = 'none';
      _qualEditingOriginal = null;
      _qualSelectedFormat = '';
    }

    /**
     * Selects a format in the qualifier modal's format toggle.
     */
    function selectQualFormat(fmt) {
      _qualSelectedFormat = fmt;
      var btn8 = document.getElementById('fmtBtn8');
      var btn9 = document.getElementById('fmtBtn9');
      btn8.classList.remove('active-8');
      btn9.classList.remove('active-9');
      if (fmt === '8') btn8.classList.add('active-8');
      if (fmt === '9') btn9.classList.add('active-9');
    }

    /**
     * Reads form values and calls addQualifier or updateQualifier.
     * Reloads admin data on success.
     */
    async function saveQualifier() {
      var start = document.getElementById('qualStartInput').value;
      var end = document.getElementById('qualEndInput').value;
      var format = _qualSelectedFormat;
      var locationName = document.getElementById('qualLocationName').value.trim();
      var locationAddress = document.getElementById('qualLocationAddress').value.trim();
      var cutoff = document.getElementById('qualCutoffInput').value;

      if (!start || !end || !format || !locationName) {
        alert('Please fill in Start, End, Format, and Location Name.');
        return;
      }

      var qualData = {
        start: start,
        end: end,
        format: format,
        locationName: locationName,
        locationAddress: locationAddress,
        cutoff: cutoff
      };

      try {
        var result;
        if (_qualEditingOriginal) {
          result = await callServer('updateQualifier', {
            originalDateDisplay: _qualEditingOriginal.dateDisplay,
            originalFormat: _qualEditingOriginal.format,
            qualData: qualData
          });
        } else {
          result = await callServer('addQualifier', {
            qualData: qualData
          });
        }

        if (!result || !result.success) {
          alert('Save failed: ' + ((result && result.error) || 'Unknown error'));
          return;
        }

        closeQualifierModal();
        await loadAdminData();
        switchTab('qualifiers');

      } catch (err) {
        alert('Save failed. Please try again.');
      }
    }


    // ======================================================================
    // Qualifier Delete
    // ======================================================================

    /**
     * Handles deleting a qualifier. Confirm modal first, then server call.
     */
    function handleDeleteQualifier(dateDisplay, format) {
      var formatName = format === '8' ? '8-Ball' : '9-Ball';
      showConfirmModal(
        'Delete Qualifier',
        'Delete the ' + formatName + ' qualifier on ' + dateDisplay + '?\n\nThis cannot be undone.',
        'Yes, Delete',
        async function() {
          try {
            var result = await callServer('deleteQualifier', {
              dateDisplay: dateDisplay,
              format: format
            });
            if (!result || !result.success) {
              alert('Delete failed: ' + ((result && result.error) || 'Unknown error'));
              return;
            }
            await loadAdminData();
            switchTab('qualifiers');
          } catch (err) {
            alert('Delete failed. Please try again.');
          }
        }
      );
    }


    // ======================================================================
    // Maintenance Mode
    // ======================================================================

    /**
     * Loads maintenance state from adminData and sets checkbox.
     */
    function loadMaintenanceState() {
      if (!adminData) return;
      var checkbox = document.getElementById('maintenanceCheckbox');
      var keyDisplay = document.getElementById('bypassKeyDisplay');

      var isEnabled = adminData.maintenanceMode || false;
      checkbox.checked = isEnabled;

      if (isEnabled && adminData.bypassKey) {
        keyDisplay.textContent = 'Bypass key: ' + adminData.bypassKey;
        keyDisplay.style.display = '';
      } else {
        keyDisplay.style.display = 'none';
      }
    }

    /**
     * Called when maintenance checkbox changes. Calls setMaintenanceMode.
     */
    async function toggleMaintenance() {
      var checkbox = document.getElementById('maintenanceCheckbox');
      var keyDisplay = document.getElementById('bypassKeyDisplay');
      var enabled = checkbox.checked;

      try {
        var result = await callServer('setMaintenanceMode', {
          enabled: enabled
        });

        if (!result || !result.success) {
          checkbox.checked = !enabled;
          alert('Failed: ' + ((result && result.error) || 'Unknown error'));
          return;
        }

        adminData.maintenanceMode = enabled;

        if (enabled && result.bypassKey) {
          adminData.bypassKey = result.bypassKey;
          keyDisplay.textContent = 'Bypass key: ' + result.bypassKey;
          keyDisplay.style.display = '';
        } else {
          keyDisplay.style.display = 'none';
        }

      } catch (err) {
        checkbox.checked = !enabled;
        alert('Failed to toggle maintenance mode. Please try again.');
      }
    }


    // ======================================================================
    // Initialization
    // ======================================================================

    document.addEventListener('DOMContentLoaded', function() {

      // -- Auth gate: check for admin token --
      if (!adminToken) {
        document.getElementById('authError').style.display = '';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }

      // Token present — show main content
      document.getElementById('authError').style.display = 'none';
      document.getElementById('mainContent').style.display = '';

      // -- Confirm modal event wiring --

      document.getElementById('confirmYes').addEventListener('click', function() {
        if (pendingConfirm) {
          var fn = pendingConfirm;
          closeConfirmModal();
          fn();
        }
      });

      document.getElementById('confirmNo').addEventListener('click', function() {
        reEnablePendingButton_();
        closeConfirmModal();
      });

      document.getElementById('confirmModal').addEventListener('click', function(e) {
        if (e.target && e.target.id === 'confirmModal') {
          reEnablePendingButton_();
          closeConfirmModal();
        }
      });

      // Payment method modal wiring REMOVED — inline buttons handle
      // their own click events via onclick="handlePayBtn(this)".

      // -- Qualifier modal backdrop click --
      document.getElementById('qualifierModal').addEventListener('click', function(e) {
        if (e.target && e.target.id === 'qualifierModal') {
          closeQualifierModal();
        }
      });

      // -- Load data --
      loadAdminData();
    });

    /**
     * Re-enables pay-method buttons that triggered a confirm modal
     * (if user cancels the undo confirmation).
     */
    function reEnablePendingButton_() {
      var buttons = document.querySelectorAll('.pay-btn');
      for (var i = 0; i < buttons.length; i++) {
        if (buttons[i]._pendingModal) {
          buttons[i].disabled = false;
          buttons[i]._pendingModal = false;
          // Also re-enable siblings (all 4 buttons in this row were disabled)
          var siblings = buttons[i].parentElement.querySelectorAll('.pay-btn');
          for (var s = 0; s < siblings.length; s++) siblings[s].disabled = false;
        }
      }
    }

  </script>
</body>
